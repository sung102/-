        function renderActionButtons() {
            const state = gameState;
            const myPlayer = state?.players.find(p => p.id === myPlayerId);
            const isMyTurn = myPlayer && pendingAction === myPlayerId && !state.gameOver;
            const canAct = isMyTurn && myPlayer && !myPlayer.folded && !myPlayer.isAllIn && myPlayer.chips > 0;

            const btnFold = document.getElementById('btnFold');
            const btnCheck = document.getElementById('btnCheck');
            const btnCall = document.getElementById('btnCall');
            const btnRaise = document.getElementById('btnRaise');
            const raiseSlider = document.getElementById('raiseSlider');
            const raiseLabel = document.getElementById('raiseAmountLabel');

            btnFold.disabled = !canAct;
            btnCheck.disabled = !canAct;
            btnCall.disabled = !canAct;
            btnRaise.disabled = !canAct;
            raiseSlider.disabled = !canAct;

            if (canAct && myPlayer) {
                const toCall = state.currentHighestBet - myPlayer.totalBetThisRound;
                if (toCall === 0) {
                    btnCheck.style.display = 'inline-block';
                    btnCall.style.display = 'none';
                    btnFold.textContent = '弃牌';
                } else {
                    btnCheck.style.display = 'none';
                    btnCall.style.display = 'inline-block';
                    btnCall.textContent = `跟注 +${formatChips(Math.min(toCall, myPlayer.chips))}`;
                    btnFold.textContent = '弃牌';
                }
                const maxRaise = myPlayer.chips;
                raiseSlider.max = maxRaise;
                raiseSlider.min = Math.max(state.minRaise, 1);
                raiseSlider.value = Math.min(Math.max(state.minRaise * 2, state.bigBlind * 2), maxRaise);
                updateRaiseAmount();
            } else {
                btnCheck.style.display = 'inline-block';
                btnCall.style.display = 'inline-block';
                btnCheck.disabled = true;
                btnCall.disabled = true;
                btnFold.disabled = true;
                btnRaise.disabled = true;
                raiseSlider.disabled = true;
                if (state?.gameOver) {
                    btnFold.textContent = '结算中';
                    btnCall.textContent = '等待新局';
                }
            }
        }

        function updateRaiseAmount() {
            const slider = document.getElementById('raiseSlider');
            const label = document.getElementById('raiseAmountLabel');
            const val = parseInt(slider.value);
            label.textContent = `+${formatChips(val)}`;
        }

        // ==================== 玩家操作 ====================
        function playerAction(action) {
            if (!gameState || pendingAction !== myPlayerId || gameState.gameOver) return;
            const state = gameState;
            const player = state.players.find(p => p.id === myPlayerId);
            if (!player || player.folded || player.isAllIn || player.chips <= 0) return;

            if (action === 'fold') {
                playerFold(state, myPlayerId);
            } else if (action === 'check') {
                playerCheck(state, myPlayerId);
            } else if (action === 'call') {
                playerCall(state, myPlayerId);
            } else if (action === 'raise') {
                const raiseAmt = parseInt(document.getElementById('raiseSlider').value);
                playerRaise(state, myPlayerId, raiseAmt);
            }

            if (isMultiplayer && broadcastChannel && isHost) {
                broadcastGameState();
            }

            afterAction();
        }

        function afterAction() {
            if (!gameState) return;
            const state = gameState;
            if (state.gameOver) {
                pendingAction = null;
                renderAll();
                // 自动开始新局
                setTimeout(() => {
                    if (gameState === state && state.gameOver) {
                        startNewHand();
                    }
                }, 2500);
                return;
            }

            // 确定下一个行动者
            const nextPlayer = state.players[state.currentPlayerIndex];
            if (nextPlayer && !nextPlayer.folded && !nextPlayer.isAllIn && nextPlayer.chips > 0) {
                pendingAction = nextPlayer.id;
                renderAll();
                if (nextPlayer.isAI && nextPlayer.id !== myPlayerId) {
                    // AI自动行动
                    setTimeout(() => {
                        if (gameState === state && pendingAction === nextPlayer.id && !state.gameOver) {
                            executeAIAction(nextPlayer.id);
                        }
                    }, 800 + Math.random() * 1200);
                }
            } else {
                // 没有可行动玩家
                checkRoundComplete(state);
                if (state.gameOver) {
                    pendingAction = null;
                    renderAll();
                    setTimeout(() => {
                        if (gameState === state && state.gameOver) startNewHand();
                    }, 2500);
                } else {
                    afterAction();
                }
            }
        }

        function executeAIAction(playerId) {
            if (!gameState || gameState.gameOver) return;
            const decision = aiMakeDecision(gameState, playerId);
            if (!decision) return;
            const state = gameState;
            if (decision.action === 'fold') playerFold(state, playerId);
            else if (decision.action === 'check') playerCheck(state, playerId);
            else if (decision.action === 'call') playerCall(state, playerId);
            else if (decision.action === 'raise') playerRaise(state, playerId, decision.amount || state.minRaise);

            if (isMultiplayer && broadcastChannel && isHost) {
                broadcastGameState();
            }
            afterAction();
        }

        function startNewHand() {
            if (!gameState) return;
            const state = gameState;
            // 移除破产玩家
            state.players.forEach(p => {
                if (p.chips <= 0) p.isActive = false;
            });
            const activePlayers = state.players.filter(p => p.isActive);
            if (activePlayers.length < 2) {
                showToast('游戏结束！活跃玩家不足，请重新开始。');
                state.gameOver = true;
                renderAll();
                return;
            }
            state.deck = shuffle(createDeck());
            state.communityCards = [];
            state.pot = 0;
            state.currentHighestBet = 0;
            state.gameOver = false;
            state.winners = [];
            state.phaseComplete = false;
            state.players.forEach(p => {
                p.holeCards = [];
                p.folded = false;
                p.isAllIn = false;
                p.currentBet = 0;
                p.totalBetThisRound = 0;
            });
            state.dealerIndex = (state.dealerIndex + 1) % state.players.length;
            while (!state.players[state.dealerIndex].isActive) {
                state.dealerIndex = (state.dealerIndex + 1) % state.players.length;
            }
            dealHoleCards(state);
            postBlinds(state);
            pendingAction = state.players[state.currentPlayerIndex]?.id || null;
            if (isMultiplayer && broadcastChannel && isHost) {
                broadcastGameState();
            }
            renderAll();
            // 如果当前行动者是AI
            const currentPlayer = state.players[state.currentPlayerIndex];
            if (currentPlayer && currentPlayer.isAI && currentPlayer.id !== myPlayerId && pendingAction === currentPlayer
                .id) {
                setTimeout(() => executeAIAction(currentPlayer.id), 600 + Math.random() * 800);
            }
        }

        // ==================== 单人模式 ====================
        function startSinglePlayer() {
            isMultiplayer = false;
            roomId = null;
            isHost = true;
            broadcastChannel = null;
            myPlayerId = 'player_1';
            assistantEnabled = true;
            document.getElementById('assistToggleBtn').className = 'header-btn assist-on';
            document.getElementById('assistToggleBtn').textContent = '💡 助教: 开';
            document.getElementById('assistantPanel').classList.remove('hidden');

            const players = [
                { id: 'player_1', name: '我', isAI: false },
                { id: 'ai_1', name: 'AI助手A', isAI: true },
                { id: 'ai_2', name: 'AI助手B', isAI: true },
                { id: 'ai_3', name: 'AI助手C', isAI: true },
            ];

            gameState = createInitialGameState(players, 1000, 5, 10);
            gameState.dealerIndex = Math.floor(Math.random() * 4);
            dealHoleCards(gameState);
            postBlinds(gameState);
            pendingAction = gameState.players[gameState.currentPlayerIndex]?.id || null;

            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            updateRoomInfo();
            renderAll();

            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            if (currentPlayer && currentPlayer.isAI && pendingAction === currentPlayer.id) {
                setTimeout(() => executeAIAction(currentPlayer.id), 700);
            }

            // 显示新手引导
            setTimeout(() => showQuickGuide(), 500);
        }

        // ==================== 多人模式 ====================
        function showMultiplayerSetup() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>👥 多人联机对战</h2>
                <p>选择你的角色：</p>
                <button class="modal-btn primary" style="width:100%;margin-bottom:0.6rem;" onclick="createMultiplayerRoom()">
                    🏠 创建房间（房主）
                </button>
                <p style="text-align:center;color:#888;">或</p>
                <input type="text" id="joinRoomId" placeholder="输入房间号加入" style="margin-top:0.6rem;">
                <button class="modal-btn secondary" style="width:100%;" onclick="joinMultiplayerRoom()">
                    🔗 加入房间
                </button>
                <div style="margin-top:0.8rem;font-size:0.7rem;color:#888;">
                    💡 多人模式使用浏览器标签页通信。请在同一设备上打开多个标签页进行联机。
                </div>
                <button class="modal-btn secondary" style="width:100%;margin-top:0.8rem;" onclick="closeModal()">取消</button>
            `;
            overlay.classList.remove('hidden');
        }

        function createMultiplayerRoom() {
            roomId = 'room-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            isMultiplayer = true;
            isHost = true;
            myPlayerId = 'host_' + Date.now();
            assistantEnabled = true;
            document.getElementById('assistToggleBtn').className = 'header-btn assist-on';
            document.getElementById('assistToggleBtn').textContent = '💡 助教: 开';
            document.getElementById('assistantPanel').classList.remove('hidden');

            const playerName = '房主';
            const players = [
                { id: myPlayerId, name: playerName, isAI: false },
                { id: 'guest_slot_1', name: '等待加入...', isAI: false, isActive: false },
                { id: 'guest_slot_2', name: '等待加入...', isAI: false, isActive: false },
                { id: 'guest_slot_3', name: '等待加入...', isAI: false, isActive: false },
            ];

            gameState = createInitialGameState(players.filter(p => p.isActive !== false), 1000, 5, 10);
            if (gameState.players.length < 2) {
                gameState.players.push({ id: 'ai_filler', name: 'AI陪玩', isAI: true, chips: 1000, holeCards: [],
                    currentBet: 0, totalBetThisRound: 0, folded: false, isAllIn: false, seatIndex: 1, isActive: true });
            }

            setupBroadcastChannel();
            closeModal();
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            updateRoomInfo();
            showRoomShareModal();
            renderAll();
        }

        function joinMultiplayerRoom() {
            const input = document.getElementById('joinRoomId');
            const rid = input.value.trim();
            if (!rid) { showToast('请输入房间号'); return; }
            roomId = rid;
            isMultiplayer = true;
            isHost = false;
            myPlayerId = 'guest_' + Date.now();
            assistantEnabled = true;
            document.getElementById('assistToggleBtn').className = 'header-btn assist-on';
            document.getElementById('assistToggleBtn').textContent = '💡 助教: 开';
            document.getElementById('assistantPanel').classList.remove('hidden');

            setupBroadcastChannel();
            closeModal();
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            updateRoomInfo();

            // 向房主发送加入请求
            if (broadcastChannel) {
                broadcastChannel.postMessage({
                    type: 'JOIN_REQUEST',
                    playerId: myPlayerId,
                    playerName: '访客' + myPlayerId.slice(-4),
                    roomId: roomId,
                });
            }
            showToast('已发送加入请求，等待房主确认...');
            renderWaitingState();
        }

        function setupBroadcastChannel() {
            if (!roomId) return;
            if (broadcastChannel) broadcastChannel.close();
            try {
                broadcastChannel = new BroadcastChannel('texas_holdem_' + roomId);
                broadcastChannel.onmessage = handleBroadcastMessage;
            } catch (e) {
                console.log('BroadcastChannel不可用，使用localStorage降级方案');
                broadcastChannel = null;
                // 使用storage事件降级
                window.addEventListener('storage', handleStorageEvent);
            }
        }

        function handleBroadcastMessage(event) {
            const msg = event.data;
            if (!msg) return;
            if (msg.type === 'STATE_UPDATE' && !isHost) {
                // 接收房主的状态更新
                const newState = msg.gameState;
                if (newState) {
                    gameState = newState;
                    pendingAction = msg.pendingAction;
                    renderAll();
                    if (pendingAction === myPlayerId && !gameState.gameOver) {
                        showToast('轮到你了！请做出决策。');
                    }
                }
            } else if (msg.type === 'JOIN_REQUEST' && isHost) {
                handleJoinRequest(msg);
            } else if (msg.type === 'JOIN_CONFIRMED' && msg.playerId === myPlayerId) {
                gameState = msg.gameState;
                pendingAction = msg.pendingAction;
                showToast('成功加入房间！');
                renderAll();
            } else if (msg.type === 'PLAYER_ACTION' && isHost) {
                handleRemoteAction(msg);
            }
        }

        function handleStorageEvent(event) {
            if (event.key === 'th_game_state_' + roomId && !isHost) {
                try {
                    const data = JSON.parse(event.newValue);
                    if (data && data.gameState) {
                        gameState = data.gameState;
                        pendingAction = data.pendingAction;
                        renderAll();
                    }
                } catch (e) {}
            }
        }

        function broadcastGameState() {
            if (!gameState) return;
            const data = { type: 'STATE_UPDATE', gameState, pendingAction, roomId };
            if (broadcastChannel) {
                broadcastChannel.postMessage(data);
            }
            // 同时存储到localStorage作为降级方案
            try {
                localStorage.setItem('th_game_state_' + roomId, JSON.stringify(data));
            } catch (e) {}
        }

        function handleJoinRequest(msg) {
            if (!isHost || !gameState) return;
            // 找一个空位
            const emptySlot = gameState.players.find(p => p.id.startsWith('guest_slot_') && !p.isActive);
            if (emptySlot) {
                emptySlot.id = msg.playerId;
                emptySlot.name = msg.playerName || '访客';
                emptySlot.isActive = true;
                emptySlot.isAI = false;
                emptySlot.chips = gameState.startingChips || 1000;
            } else {
                // 添加新玩家
                gameState.players.push({
                    id: msg.playerId,
                    name: msg.playerName || '访客',
                    isAI: false,
                    isActive: true,
                    chips: gameState.startingChips || 1000,
                    holeCards: [],
                    currentBet: 0,
                    totalBetThisRound: 0,
                    folded: false,
                    isAllIn: false,
                    seatIndex: gameState.players.length,
                });
            }
            if (broadcastChannel) {
                broadcastChannel.postMessage({
                    type: 'JOIN_CONFIRMED',
                    playerId: msg.playerId,
                    gameState,
                    pendingAction,
                    roomId,
                });
            }
            broadcastGameState();
            renderAll();
            showToast(`${msg.playerName || '访客'} 加入了房间！`);
        }

        function handleRemoteAction(msg) {
            if (!isHost || !gameState) return;
            const { playerId, action, raiseAmount } = msg;
            const state = gameState;
            if (pendingAction !== playerId || state.gameOver) return;
            if (action === 'fold') playerFold(state, playerId);
            else if (action === 'check') playerCheck(state, playerId);
            else if (action === 'call') playerCall(state, playerId);
            else if (action === 'raise') playerRaise(state, playerId, raiseAmount || state.minRaise);
            broadcastGameState();
            afterAction();
        }

        function renderWaitingState() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = `
                <div style="padding:2rem;text-align:center;color:#888;">
                    ⏳ 等待房主确认加入...
                </div>
            `;
        }

        function showRoomShareModal() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            const shareUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl)}`;
            content.innerHTML = `
                <h2>🔗 邀请好友</h2>
                <p>房间号：<span class="highlight">${roomId}</span></p>
                <div class="share-link">${shareUrl}</div>
                <div class="qr-container">
                    <img src="${qrApiUrl}" alt="QR码" onerror="this.parentElement.innerHTML='<p style=\\'color:#888;\\'>QR码加载失败，请复制上方链接分享</p>'">
                    <p style="font-size:0.7rem;color:#888;margin-top:0.3rem;">微信扫码即可加入</p>
                </div>
                <p style="font-size:0.75rem;color:#888;">💡 好友在同一设备打开新标签页，输入房间号 <b>${roomId}</b> 即可加入联机。</p>
                <button class="modal-btn primary" style="width:100%;" onclick="copyShareLink('${shareUrl}')">📋 复制链接</button>
                <button class="modal-btn secondary" style="width:100%;margin-top:0.5rem;" onclick="closeModal()">关闭</button>
            `;
            overlay.classList.remove('hidden');
        }

        function copyShareLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制！发送给好友即可。');
            }).catch(() => {
                showToast('复制失败，请手动复制链接。');
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
        }

        // ==================== 辅助功能 ====================
        function showQuickGuide() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>👋 欢迎来到德州扑克！</h2>
                <p>这是专为<b>纯新手</b>设计的德州扑克，快速了解：</p>
                <p>🎯 <span class="highlight">目标</span>：用2张底牌+5张公共牌组成最佳5张牌型，赢得底池。</p>
                <p>🃏 <span class="highlight">流程</span>：翻牌前→翻牌(3张)→转牌(1张)→河牌(1张)→摊牌比大小。</p>
                <p>💡 <span class="highlight">AI助教</span>：右侧面板会在每个决策点给出建议，帮你学习！</p>
                <p>🕹️ <span class="highlight">操作</span>：轮到您时，点击下方按钮：弃牌/过牌/跟注/加注。</p>
                <p style="color:#80c880;">放松心态，享受游戏过程吧！每一局都是学习的机会。</p>
                <button class="modal-btn primary" style="width:100%;" onclick="closeModal()">明白了，开始游戏！</button>
            `;
            overlay.classList.remove('hidden');
        }

        function showRules() {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>📖 德州扑克规则速查</h2>
                <p><b>牌型排名（从高到低）：</b></p>
                <p>🔴 皇家同花顺：A-K-Q-J-10同花色</p>
                <p>🟠 同花顺：五张连续同花色</p>
                <p>🟡 四条：四张相同点数</p>
                <p>🟢 葫芦：三条+一对</p>
                <p>🔵 同花：五张同花色</p>
                <p>🟣 顺子：五张连续不同花色</p>
                <p>🟤 三条：三张相同点数</p>
                <p>⚪ 两对：两个对子</p>
                <p>⚫ 一对：一个对子</p>
                <p>⬜ 高牌：以上都不是</p>
                <p style="font-size:0.75rem;color:#888;">同级别比较单张牌点数，A最大，2最小。</p>
                <button class="modal-btn primary" style="width:100%;" onclick="closeModal()">关闭</button>
            `;
            overlay.classList.remove('hidden');
        }

        function leaveGame() {
            if (broadcastChannel) {
                broadcastChannel.postMessage({ type: 'LEAVE', playerId: myPlayerId, roomId });
                broadcastChannel.close();
                broadcastChannel = null;
            }
            window.removeEventListener('storage', handleStorageEvent);
            gameState = null;
            myPlayerId = null;
            pendingAction = null;
            isMultiplayer = false;
            roomId = null;
            isHost = false;
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('assistantPanel').classList.add('hidden');
            document.getElementById('modalOverlay').classList.add('hidden');
            // 清理localStorage
            try { localStorage.removeItem('th_game_state_' + roomId); } catch (e) {}
        }

        // ==================== 初始化 ====================
        function init() {
            // 检查URL参数，自动加入房间
            const urlParams = new URLSearchParams(window.location.search);
            const urlRoom = urlParams.get('room');
            if (urlRoom) {
                roomId = urlRoom;
                isMultiplayer = true;
                isHost = false;
                myPlayerId = 'guest_url_' + Date.now();
                assistantEnabled = true;
                document.getElementById('assistToggleBtn').className = 'header-btn assist-on';
                document.getElementById('assistToggleBtn').textContent = '💡 助教: 开';
                document.getElementById('assistantPanel').classList.remove('hidden');
                setupBroadcastChannel();
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('gameContainer').classList.add('active');
                updateRoomInfo();
                if (broadcastChannel) {
                    broadcastChannel.postMessage({
                        type: 'JOIN_REQUEST',
                        playerId: myPlayerId,
                        playerName: '访客' + myPlayerId.slice(-6),
                        roomId: roomId,
                    });
                }
                showToast('正在加入房间 ' + urlRoom + '...');
                renderWaitingState();
            }
        }

        // 点击弹窗遮罩关闭
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (!gameState || pendingAction !== myPlayerId || gameState.gameOver) return;
            if (e.key === 'f' || e.key === 'F') playerAction('fold');
            else if (e.key === 'c' || e.key === 'C') {
                const toCall = gameState.currentHighestBet - (gameState.players.find(p => p.id === myPlayerId)
                    ?.totalBetThisRound || 0);
                if (toCall === 0) playerAction('check');
                else playerAction('call');
            } else if (e.key === 'r' || e.key === 'R') playerAction('raise');
            else if (e.key === 'ArrowRight') {
                const slider = document.getElementById('raiseSlider');
                slider.value = Math.min(parseInt(slider.max), parseInt(slider.value) + 10);
                updateRaiseAmount();
            } else if (e.key === 'ArrowLeft') {
                const slider = document.getElementById('raiseSlider');
                slider.value = Math.max(parseInt(slider.min), parseInt(slider.value) - 10);
                updateRaiseAmount();
            }
        });

        init();
        console.log('🃏 德州扑克 - 新手友好版 已就绪');
        console.log('  单人模式：点击"单人练习模式"开始');
        console.log('  多人模式：创建房间后，在新标签页打开相同URL并输入房间号');
        console.log('  快捷键：F=弃牌 C=过牌/跟注 R=加注 ←→=调整加注金额');
    </script>
</body>
</html>
